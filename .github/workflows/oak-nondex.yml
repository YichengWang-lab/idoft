name: Oak NonDex Reproduction

on:
  workflow_dispatch:

jobs:
  nondex:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout IDoFT fork
        uses: actions/checkout@v4

      - name: Install Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Clone Jackrabbit Oak
        run: |
          cd /tmp
          git clone https://github.com/apache/jackrabbit-oak
          cd jackrabbit-oak
          git checkout 0440e096dc7a460d206c77a5f178796db31a0ef4

      - name: Build oak-auth-ldap
        run: |
          cd /tmp/jackrabbit-oak
          mvn clean install -DskipTests -pl oak-auth-ldap -am

      - name: Run flaky test with NonDex
        run: |
          cd /tmp/jackrabbit-oak
          mvn -pl oak-auth-ldap \
          edu.illinois:nondex-maven-plugin:2.1.1:nondex \
          -Dtest=org.apache.jackrabbit.oak.security.authentication.ldap.LdapLoginStandaloneTest#testSyncCreateUserCaseInsensitive \
          -DnondexRuns=10
